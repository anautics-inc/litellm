# GitLab CI pipeline for build + SBOM/ATO artifacts + EC2 deployment

include:
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

stages:
  - build
  - test
  - scan
  - sbom
  - package
  - deploy

variables:
  DS_INCLUDE_DEV_DEPENDENCIES: "false"
  DS_ENFORCE_NEW_ANALYZER: "true"
  DOCKER_BUILDKIT: "1"
  CYCLONEDX_VERSION: "v0.29.1"
  CYCLONEDX_LINUX_MUSL_X64_SHA256: "526d55f67ac53744f45525f30f0f210d3a95e044b5073904cb3eacb8f8e52135"
  DOCKER_CONFIG: "$CI_PROJECT_DIR/.docker"
  LITELLM_HOST_PORT: "4000"
  LITELLM_CONTAINER_PORT: "4000"
  # Keep LiteLLM private to the instance so Captify Core can access it via localhost.
  LITELLM_BIND_ADDRESS: "127.0.0.1"
  LITELLM_AWS_REGION: "us-gov-west-1"
  LITELLM_AWS_PARTITION: "aws-us-gov"
  LITELLM_SSM_ROLE_NAME: "ansible-ssm-target-role"

build-wheel:
  stage: build
  image: python:3.12-slim-bookworm
  before_script:
    - python -m pip install --no-cache-dir "uv==0.8.19"
    - uv --version
  script:
    - uv build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - when: always

build-image:
  stage: build
  before_script:
    - docker info
    - docker buildx version
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - LITELLM_VERSION=$(grep '^version' pyproject.toml | head -1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
    - echo "$LITELLM_VERSION" > litellm_version.txt
    - |
      docker buildx build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" \
        --cache-from "$CI_REGISTRY_IMAGE:latest" \
        -f Dockerfile \
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" \
        --load \
        .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  artifacts:
    paths:
      - litellm_version.txt
    expire_in: 1 week
  rules:
    - when: always
  tags:
    - al2023-fips-shell

build-sbom-image:
  stage: build
  needs:
    - job: build-image
      artifacts: true
  before_script:
    - docker info
    - docker buildx version
  script:
    - LITELLM_VERSION=$(cat litellm_version.txt)
    - docker buildx build -f Dockerfile.sbom -t "litellm-sbom:$LITELLM_VERSION" --load .
    - SBOM_CONTAINER_ID=$(docker create "litellm-sbom:$LITELLM_VERSION")
    - docker cp "$SBOM_CONTAINER_ID":/sbom/build-sbom.json ./build-sbom.json
    - docker cp "$SBOM_CONTAINER_ID":/sbom/runtime-sbom.json ./runtime-sbom.json
    - docker rm "$SBOM_CONTAINER_ID"
  artifacts:
    paths:
      - build-sbom.json
      - runtime-sbom.json
    expire_in: 1 week
  rules:
    - when: always
  tags:
    - al2023-fips-shell

dashboard-sbom:
  stage: build
  image: node:20
  before_script:
    - cd ui/litellm-dashboard
    - npm install -g @cyclonedx/cyclonedx-npm@4.0.0
    - npm ci
  script:
    - cyclonedx-npm --output-file dashboard-sbom.json --output-format JSON --sv 1.6
    - mv dashboard-sbom.json ../../dashboard-sbom.json
  artifacts:
    paths:
      - dashboard-sbom.json
    expire_in: 1 week
  rules:
    - when: always

dependency-scanning:
  stage: test
  rules:
    - when: always

semgrep-sast:
  stage: test
  artifacts:
    paths:
      - gl-sast-report.json
    reports:
      sast: gl-sast-report.json
    expire_in: 1 week
  rules:
    - when: never

container_scanning:
  stage: scan
  variables:
    CS_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
    SECURE_LOG_LEVEL: debug
    CI_GITLAB_FIPS_MODE: "false"
  needs:
    - job: build-image
      artifacts: true
    - job: dependency-scanning
      artifacts: true
      optional: true
  dependencies:
    - dependency-scanning
  artifacts:
    paths:
      - gl-container-scanning-report.json
      - gl-sbom*.cdx.json
    reports:
      container_scanning: gl-container-scanning-report.json
    expire_in: 1 week
  rules:
    - when: always

grype-sbom-scan:
  stage: sbom
  image: alpine:3.22
  variables:
    GRYPE_VERSION: "v0.92.0"
    GRYPE_LINUX_AMD64_SHA256: "1449ea724676f8df6e58da3409087c8bbaee04a346cbee7466353ccf78a9fcac"
  needs:
    - job: build-sbom-image
      artifacts: true
    - job: dashboard-sbom
      artifacts: true
  before_script:
    - apk add --no-cache curl tar
    - GRYPE_ARCHIVE="grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz"
    - curl -fsSL -o "$GRYPE_ARCHIVE" "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/${GRYPE_ARCHIVE}"
    - echo "${GRYPE_LINUX_AMD64_SHA256}  ${GRYPE_ARCHIVE}" | sha256sum -c -
    - tar -xzf "$GRYPE_ARCHIVE" grype
    - install -m 0755 grype /usr/local/bin/grype
    - grype version
  script:
    - mkdir -p grype-scan-results
    - |
      run_grype_scan() {
        input_file="$1"
        output_file="$2"

        if [ -f "$input_file" ]; then
          if ! grype "sbom:$input_file" -o json > "$output_file"; then
            echo '{"matches":[]}' > "$output_file"
          fi
        else
          echo '{"matches":[]}' > "$output_file"
        fi
      }

      run_grype_scan build-sbom.json grype-scan-results/build-sbom-grype.json
      run_grype_scan runtime-sbom.json grype-scan-results/runtime-sbom-grype.json
      run_grype_scan dashboard-sbom.json grype-scan-results/dashboard-sbom-grype.json
  artifacts:
    paths:
      - grype-scan-results/
    expire_in: 1 week
  rules:
    - when: always

merge-sbom:
  stage: sbom
  image: alpine:3.22
  variables:
    DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
  needs:
    - job: build-image
      artifacts: true
    - job: build-sbom-image
      artifacts: true
    - job: container_scanning
      artifacts: true
  before_script:
    - apk add --no-cache curl libgcc libstdc++
  script:
    - curl -fsSL -o ./cyclonedx "https://github.com/CycloneDX/cyclonedx-cli/releases/download/${CYCLONEDX_VERSION}/cyclonedx-linux-musl-x64"
    - echo "${CYCLONEDX_LINUX_MUSL_X64_SHA256}  ./cyclonedx" | sha256sum -c -
    - chmod +x ./cyclonedx
    - ./cyclonedx --version
    - |
      CONTAINER_SBOM=$(ls gl-sbom*.cdx.json 2>/dev/null | head -1)
      if [ -z "$CONTAINER_SBOM" ]; then
        echo "WARNING: no container SBOM found; using environment SBOM only"
      else
        echo "Using container SBOM: $CONTAINER_SBOM"
      fi
    - |
      if [ -n "$CONTAINER_SBOM" ]; then
        ./cyclonedx merge \
          --input-files "$CONTAINER_SBOM" build-sbom.json \
          --output-file build-sbom-merged.cdx.json \
          --output-format json \
          --output-version v1_6
      else
        ./cyclonedx merge \
          --input-files build-sbom.json \
          --output-file build-sbom-merged.cdx.json \
          --output-format json \
          --output-version v1_6
      fi
    - |
      if [ -n "$CONTAINER_SBOM" ]; then
        ./cyclonedx merge \
          --input-files "$CONTAINER_SBOM" runtime-sbom.json \
          --output-file runtime-sbom-merged.cdx.json \
          --output-format json \
          --output-version v1_6
      else
        ./cyclonedx merge \
          --input-files runtime-sbom.json \
          --output-file runtime-sbom-merged.cdx.json \
          --output-format json \
          --output-version v1_6
      fi
  artifacts:
    paths:
      - build-sbom-merged.cdx.json
      - runtime-sbom-merged.cdx.json
      - dashboard-sbom.json
    expire_in: 1 week
  rules:
    - when: always

enrich-sboms:
  stage: sbom
  image: python:3.12-slim-bookworm
  needs:
    - job: merge-sbom
      artifacts: true
    - job: dependency-scanning
      artifacts: true
    - job: dashboard-sbom
      artifacts: true
    - job: grype-sbom-scan
      artifacts: true
  before_script:
    - python -m pip install --no-cache-dir "uv==0.8.19"
    - uv --version
    - pip install pandas openpyxl
  script:
    - |
      if [ -f gl-dependency-scanning-report.json ]; then
        echo "Using GitLab dependency scanning report for SBOM enrichment"
        python scripts/sbom-vuln-injection.py build-sbom-merged.cdx.json gl-dependency-scanning-report.json build-sbom-enriched.cdx.json
        python scripts/sbom-vuln-injection.py runtime-sbom-merged.cdx.json gl-dependency-scanning-report.json runtime-sbom-enriched.cdx.json
        python scripts/sbom-vuln-injection.py dashboard-sbom.json gl-dependency-scanning-report.json dashboard-sbom-enriched.cdx.json
      else
        echo "GitLab dependency scan not found; falling back to Grype results"

        mkdir -p grype-scan-results
        for fallback_file in \
          grype-scan-results/build-sbom-grype.json \
          grype-scan-results/runtime-sbom-grype.json \
          grype-scan-results/dashboard-sbom-grype.json; do
          if [ ! -f "$fallback_file" ]; then
            echo "WARNING: Missing $fallback_file; creating empty fallback report"
            echo '{"matches":[]}' > "$fallback_file"
          fi
        done

        python scripts/sbom-vuln-injection.py build-sbom-merged.cdx.json grype-scan-results/build-sbom-grype.json build-sbom-enriched.cdx.json
        python scripts/sbom-vuln-injection.py runtime-sbom-merged.cdx.json grype-scan-results/runtime-sbom-grype.json runtime-sbom-enriched.cdx.json
        python scripts/sbom-vuln-injection.py dashboard-sbom.json grype-scan-results/dashboard-sbom-grype.json dashboard-sbom-enriched.cdx.json
      fi
  artifacts:
    paths:
      - build-sbom-enriched.cdx.json
      - runtime-sbom-enriched.cdx.json
      - dashboard-sbom-enriched.cdx.json
    expire_in: 1 week
  rules:
    - when: always

convert-sbom:
  stage: sbom
  image: python:3.12-slim-bookworm
  before_script:
    - python -m pip install --no-cache-dir "uv==0.8.19"
    - uv --version
  needs:
    - job: enrich-sboms
      artifacts: true
  script:
    - uv run --with pandas==2.3.3 --with openpyxl==3.1.5 python scripts/convert_sbom_with_vulns.py -i build-sbom-enriched.cdx.json -o build-sbom.xlsx
    - uv run --with pandas==2.3.3 --with openpyxl==3.1.5 python scripts/convert_sbom_with_vulns.py -i runtime-sbom-enriched.cdx.json -o runtime-sbom.xlsx
    - uv run --with pandas==2.3.3 --with openpyxl==3.1.5 python scripts/convert_sbom_with_vulns.py -i dashboard-sbom-enriched.cdx.json -o dashboard-sbom.xlsx
  artifacts:
    paths:
      - build-sbom.xlsx
      - runtime-sbom.xlsx
      - dashboard-sbom.xlsx
    expire_in: 1 week
  rules:
    - when: always

package-documents:
  stage: package
  image: alpine:3.22
  needs:
    - job: build-image
      artifacts: true
    - job: semgrep-sast
      artifacts: true
      optional: true
    - job: dependency-scanning
      artifacts: true
      optional: true
    - job: container_scanning
      artifacts: true
      optional: true
    - job: merge-sbom
      artifacts: true
    - job: dashboard-sbom
      artifacts: true
    - job: enrich-sboms
      artifacts: true
    - job: convert-sbom
      artifacts: true
  script:
    - mkdir -p "ci-documents-${CI_PIPELINE_ID}"
    - DATE=$(date +%m-%d-%Y)
    - LITELLM_VERSION=$(cat litellm_version.txt)
    - |
      if [ -f gl-sast-report.json ]; then
        cp gl-sast-report.json "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-gl-sast-report.json"
      fi
    - |
      if [ -f gl-dependency-scanning-report.json ]; then
        cp gl-dependency-scanning-report.json "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-gl-dependency-scanning-report.json"
      fi
    - |
      CONTAINER_SBOM=$(ls gl-sbom*.cdx.json 2>/dev/null | head -1)
      if [ -n "$CONTAINER_SBOM" ]; then
        cp "$CONTAINER_SBOM" "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-gl-container-sbom.json"
      fi
    - |
      if [ -f gl-container-scanning-report.json ]; then
        cp gl-container-scanning-report.json "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-gl-container-scanning-report.json"
      fi
    - cp build-sbom-merged.cdx.json "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-build-sbom-${LITELLM_VERSION}.cdx.json"
    - cp build-sbom.xlsx "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-build-sbom-${LITELLM_VERSION}.xlsx"
    - cp runtime-sbom-merged.cdx.json "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-runtime-sbom-${LITELLM_VERSION}.cdx.json"
    - cp runtime-sbom.xlsx "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-runtime-sbom-${LITELLM_VERSION}.xlsx"
    - cp dashboard-sbom.json "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-dashboard-sbom-${LITELLM_VERSION}.json"
    - cp dashboard-sbom-enriched.cdx.json "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-dashboard-sbom-enriched-${LITELLM_VERSION}.cdx.json"
    - cp dashboard-sbom.xlsx "ci-documents-${CI_PIPELINE_ID}/${DATE}_litellm-dashboard-sbom-${LITELLM_VERSION}.xlsx"
    - ls -1 "ci-documents-${CI_PIPELINE_ID}/"
  artifacts:
    paths:
      - ci-documents-*
    expire_in: 90 days
  rules:
    - when: always

.deploy_template:
  stage: deploy
  image:
    name: public.ecr.aws/aws-cli/aws-cli:2.17.59
    entrypoint: [""]
  before_script:
    - mkdir -p "$DOCKER_CONFIG"
    - aws --version
    - echo "--- available LITELLM_* variables (names only) ---"
    - printenv | grep -i 'LITELLM\|DEV_ENV\|STAGING_ENV\|PRODUCTION_ENV\|ENV_FILE' | sed 's/=.*/=<set>/' || true
    - echo "---------------------------------------------------"
  script:
    - 'test -n "$EC2_IDS" || (echo "FATAL: EC2_IDS is not set" && exit 1)'
    - 'test -n "$AWS_ACCOUNT_ID" || (echo "FATAL: AWS_ACCOUNT_ID is not set" && exit 1)'
    - 'test -n "$ENV_FILE" || (echo "FATAL: ENV_FILE is not set -- check that the GitLab variable is not Protected (Settings > CI/CD > Variables) or has wrong environment scope" && exit 1)'
    - 'test -f "$ENV_FILE" || (echo "FATAL: ENV_FILE path is not a file: $ENV_FILE" && exit 1)'
    - 'test -n "$LITELLM_AWS_REGION" || (echo "FATAL: LITELLM_AWS_REGION is not set" && exit 1)'
    - 'test -n "$CI_REGISTRY_IMAGE" || (echo "FATAL: CI_REGISTRY_IMAGE is not set" && exit 1)'
    - 'test -n "$CI_REGISTRY_USER" || (echo "FATAL: CI_REGISTRY_USER is not set" && exit 1)'
    - 'test -n "$CI_REGISTRY_PASSWORD" || (echo "FATAL: CI_REGISTRY_PASSWORD is not set" && exit 1)'
    - 'test -n "$DATABASE_PASSWORD" || (echo "FATAL: DATABASE_PASSWORD is not set -- define it in Settings > CI/CD > Variables and ensure scope/protection matches this pipeline" && exit 1)'

    - echo "Assuming role in account $AWS_ACCOUNT_ID..."
    - |
      ROLE_CREDS=$(aws sts assume-role \
        --role-arn "arn:${LITELLM_AWS_PARTITION}:iam::${AWS_ACCOUNT_ID}:role/${LITELLM_SSM_ROLE_NAME}" \
        --role-session-name "GitLabCI-LiteLLM-Deploy-$(date +%s)" \
        --region "$LITELLM_AWS_REGION" \
        --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
        --output text)
      read -r TEMP_ACCESS_KEY TEMP_SECRET_KEY TEMP_SESSION_TOKEN <<EOF
      $ROLE_CREDS
      EOF
      test -n "$TEMP_ACCESS_KEY" || (echo "FATAL: Failed to obtain STS credentials" && exit 1)
      export AWS_ACCESS_KEY_ID="$TEMP_ACCESS_KEY"
      export AWS_SECRET_ACCESS_KEY="$TEMP_SECRET_KEY"
      export AWS_SESSION_TOKEN="$TEMP_SESSION_TOKEN"

    - aws sts get-caller-identity --region "$LITELLM_AWS_REGION" >/dev/null

    - |
      echo "Confirming SSM registration for instances: $EC2_IDS"
      for INSTANCE_ID in $(echo "$EC2_IDS" | tr ' ' '\n'); do
        STATUS=$(aws ssm describe-instance-information \
          --region "$LITELLM_AWS_REGION" \
          --query "InstanceInformationList[?InstanceId=='$INSTANCE_ID'].PingStatus | [0]" \
          --output text)
        [ "$STATUS" = "Online" ] || (echo "FATAL: $INSTANCE_ID not Online in SSM" && exit 1)
      done

    - ENV_FILE_B64=$(base64 -w 0 "$ENV_FILE")
    - |
      if [ "${DEBUG_DEPLOY_PASSWORD_FLOW:-true}" = "true" ]; then
        echo "DEBUG: DATABASE_PASSWORD is set: $([ -n "${DATABASE_PASSWORD:-}" ] && echo yes || echo no)"
        echo "DEBUG: DATABASE_PASSWORD_READ_REPLICA is set: $([ -n "${DATABASE_PASSWORD_READ_REPLICA:-}" ] && echo yes || echo no)"
        if [ -n "${DATABASE_PASSWORD:-}" ]; then
          echo "DEBUG: DATABASE_PASSWORD length=${#DATABASE_PASSWORD}"
          printf '%s' "$DATABASE_PASSWORD" | sha256sum | awk '{print "DEBUG: DATABASE_PASSWORD sha256=" $1}'
          case "$DATABASE_PASSWORD" in
            *$'\n'*) echo "DEBUG: DATABASE_PASSWORD contains newline characters" ;;
          esac
          case "$DATABASE_PASSWORD" in
            *$'\r'*) echo "DEBUG: DATABASE_PASSWORD contains carriage-return characters" ;;
          esac
        fi
        if [ -n "${DATABASE_PASSWORD_READ_REPLICA:-}" ]; then
          echo "DEBUG: DATABASE_PASSWORD_READ_REPLICA length=${#DATABASE_PASSWORD_READ_REPLICA}"
          printf '%s' "$DATABASE_PASSWORD_READ_REPLICA" | sha256sum | awk '{print "DEBUG: DATABASE_PASSWORD_READ_REPLICA sha256=" $1}'
          case "$DATABASE_PASSWORD_READ_REPLICA" in
            *$'\n'*) echo "DEBUG: DATABASE_PASSWORD_READ_REPLICA contains newline characters" ;;
          esac
          case "$DATABASE_PASSWORD_READ_REPLICA" in
            *$'\r'*) echo "DEBUG: DATABASE_PASSWORD_READ_REPLICA contains carriage-return characters" ;;
          esac
        fi
      fi

      DATABASE_PASSWORD_B64=""
      DATABASE_PASSWORD_READ_REPLICA_B64=""
      DATABASE_PASSWORD_SHA256=""
      DATABASE_PASSWORD_READ_REPLICA_SHA256=""
      if [ -n "${DATABASE_PASSWORD:-}" ]; then
        DATABASE_PASSWORD_B64=$(printf '%s' "$DATABASE_PASSWORD" | base64 -w 0)
        DATABASE_PASSWORD_SHA256=$(printf '%s' "$DATABASE_PASSWORD" | sha256sum | awk '{print $1}')
      fi
      if [ -n "${DATABASE_PASSWORD_READ_REPLICA:-}" ]; then
        DATABASE_PASSWORD_READ_REPLICA_B64=$(printf '%s' "$DATABASE_PASSWORD_READ_REPLICA" | base64 -w 0)
        DATABASE_PASSWORD_READ_REPLICA_SHA256=$(printf '%s' "$DATABASE_PASSWORD_READ_REPLICA" | sha256sum | awk '{print $1}')
      fi

    - |
      cat > deploy.sh <<EOF
      #!/bin/bash
      set -euo pipefail

      DOCKER_REGISTRY="$CI_REGISTRY_IMAGE"
      IMAGE_VERSION="$CI_COMMIT_REF_SLUG"
      DOCKER_USER="$CI_REGISTRY_USER"
      DOCKER_TOKEN="$CI_REGISTRY_PASSWORD"
      DEBUG_DEPLOY_PASSWORD_FLOW="${DEBUG_DEPLOY_PASSWORD_FLOW:-true}"
      DB_PASSWORD_B64="$DATABASE_PASSWORD_B64"
      DB_PASSWORD_READ_REPLICA_B64="$DATABASE_PASSWORD_READ_REPLICA_B64"
      DB_PASSWORD_SHA256="$DATABASE_PASSWORD_SHA256"
      DB_PASSWORD_READ_REPLICA_SHA256="$DATABASE_PASSWORD_READ_REPLICA_SHA256"

      IMAGE="\$DOCKER_REGISTRY:\$IMAGE_VERSION"

      echo "Logging into Docker registry..."
      echo "\$DOCKER_TOKEN" | docker login --username "\$DOCKER_USER" --password-stdin "\$DOCKER_REGISTRY"

      echo "Pulling image \$IMAGE..."
      docker pull "\$IMAGE"

      echo "Stopping/removing existing litellm container if present..."
      docker stop litellm 2>/dev/null || true
      docker rm litellm 2>/dev/null || true

      echo "Writing runtime environment file..."
      echo "$ENV_FILE_B64" | base64 -d > /litellm.env
      if [ "$DEBUG_DEPLOY_PASSWORD_FLOW" = "true" ]; then
        echo "DEBUG: /litellm.env keys before injection (values redacted)"
          awk -F= 'NF{print \$1 "=<redacted>"}' /litellm.env
      fi
      # Inject masked DB passwords from CI variables into the runtime env file.
      sed -i '/^DATABASE_PASSWORD=/d' /litellm.env
      sed -i '/^DATABASE_PASSWORD_READ_REPLICA=/d' /litellm.env
      if [ -n "\$DB_PASSWORD_B64" ]; then
        DB_PASSWORD=\$(printf '%s' "\$DB_PASSWORD_B64" | base64 -d)
        printf 'DATABASE_PASSWORD=%s\n' "\$DB_PASSWORD" >> /litellm.env
        if [ "\$DEBUG_DEPLOY_PASSWORD_FLOW" = "true" ]; then
              DB_PASSWORD_ACTUAL_SHA256=\$(printf '%s' "\$DB_PASSWORD" | sha256sum | cut -d ' ' -f1 | tr -d '\r\n[:space:]')
            DB_PASSWORD_EXPECTED_SHA256=\$(printf '%s' "\$DB_PASSWORD_SHA256" | tr -d '\r\n[:space:]')
            echo "DEBUG: remote DATABASE_PASSWORD sha256=\$DB_PASSWORD_ACTUAL_SHA256"
            echo "DEBUG: expected DATABASE_PASSWORD sha256=\$DB_PASSWORD_EXPECTED_SHA256"
            [ "\$DB_PASSWORD_ACTUAL_SHA256" = "\$DB_PASSWORD_EXPECTED_SHA256" ] || { echo "FATAL: DATABASE_PASSWORD hash mismatch between CI and remote host"; exit 1; }
        fi
        if awk -F= '{ key=\$1; sub(/\r$/, "", key); if (key=="DATABASE_PASSWORD") found=1 } END{ exit(found?0:1) }' /litellm.env; then
          echo "Injected DATABASE_PASSWORD into runtime env file (masked in CI logs)"
        else
          echo "FATAL: DATABASE_PASSWORD injection into /litellm.env failed"
          exit 1
        fi
      fi
      if [ -n "\$DB_PASSWORD_READ_REPLICA_B64" ]; then
        DB_PASSWORD_READ_REPLICA=\$(printf '%s' "\$DB_PASSWORD_READ_REPLICA_B64" | base64 -d)
        printf 'DATABASE_PASSWORD_READ_REPLICA=%s\n' "\$DB_PASSWORD_READ_REPLICA" >> /litellm.env
        if [ "\$DEBUG_DEPLOY_PASSWORD_FLOW" = "true" ]; then
              DB_PASSWORD_READ_REPLICA_ACTUAL_SHA256=\$(printf '%s' "\$DB_PASSWORD_READ_REPLICA" | sha256sum | cut -d ' ' -f1 | tr -d '\r\n[:space:]')
            DB_PASSWORD_READ_REPLICA_EXPECTED_SHA256=\$(printf '%s' "\$DB_PASSWORD_READ_REPLICA_SHA256" | tr -d '\r\n[:space:]')
            echo "DEBUG: remote DATABASE_PASSWORD_READ_REPLICA sha256=\$DB_PASSWORD_READ_REPLICA_ACTUAL_SHA256"
            echo "DEBUG: expected DATABASE_PASSWORD_READ_REPLICA sha256=\$DB_PASSWORD_READ_REPLICA_EXPECTED_SHA256"
            [ "\$DB_PASSWORD_READ_REPLICA_ACTUAL_SHA256" = "\$DB_PASSWORD_READ_REPLICA_EXPECTED_SHA256" ] || { echo "FATAL: DATABASE_PASSWORD_READ_REPLICA hash mismatch between CI and remote host"; exit 1; }
        fi
        if awk -F= '{ key=\$1; sub(/\r$/, "", key); if (key=="DATABASE_PASSWORD_READ_REPLICA") found=1 } END{ exit(found?0:1) }' /litellm.env; then
          echo "Injected DATABASE_PASSWORD_READ_REPLICA into runtime env file (masked in CI logs)"
        else
          echo "FATAL: DATABASE_PASSWORD_READ_REPLICA injection into /litellm.env failed"
          exit 1
        fi
      fi
      if [ "$DEBUG_DEPLOY_PASSWORD_FLOW" = "true" ]; then
        echo "DEBUG: /litellm.env keys after injection (values redacted)"
          awk -F= 'NF{print \$1 "=<redacted>"}' /litellm.env
        echo "DEBUG: DATABASE_PASSWORD entries in /litellm.env: \$(awk -F= '{ key=\$1; sub(/\r$/, "", key); if (key=="DATABASE_PASSWORD") c++ } END{print c+0}' /litellm.env)"
        echo "DEBUG: DATABASE_PASSWORD_READ_REPLICA entries in /litellm.env: \$(awk -F= '{ key=\$1; sub(/\r$/, "", key); if (key=="DATABASE_PASSWORD_READ_REPLICA") c++ } END{print c+0}' /litellm.env)"
      fi
      chmod 600 /litellm.env

      echo "Running LiteLLM container on ${LITELLM_BIND_ADDRESS}:${LITELLM_HOST_PORT} -> ${LITELLM_CONTAINER_PORT}..."
      docker run \
        --name litellm \
        --network captify-net \
        --restart always \
        --env-file /litellm.env \
        --publish ${LITELLM_BIND_ADDRESS}:${LITELLM_HOST_PORT}:${LITELLM_CONTAINER_PORT} \
        --detach "\$IMAGE" \
        --port "${LITELLM_CONTAINER_PORT}"

      if [ -n "\$DB_PASSWORD_B64" ]; then
        CONTAINER_ENV=\$(docker inspect litellm --format '{{range .Config.Env}}{{println .}}{{end}}')
        if printf '%s\n' "\$CONTAINER_ENV" | grep -q '^DATABASE_PASSWORD='; then
          echo "Verified DATABASE_PASSWORD present in running container env (value masked)"
        else
          echo "FATAL: DATABASE_PASSWORD missing from running container env"
          exit 1
        fi
      fi
      if [ -n "\$DB_PASSWORD_READ_REPLICA_B64" ]; then
        CONTAINER_ENV=\$(docker inspect litellm --format '{{range .Config.Env}}{{println .}}{{end}}')
        if printf '%s\n' "\$CONTAINER_ENV" | grep -q '^DATABASE_PASSWORD_READ_REPLICA='; then
          echo "Verified DATABASE_PASSWORD_READ_REPLICA present in running container env (value masked)"
        else
          echo "FATAL: DATABASE_PASSWORD_READ_REPLICA missing from running container env"
          exit 1
        fi
      fi

      echo "Waiting for LiteLLM liveliness endpoint..."
      for i in {1..30}; do
        if curl -fsS "http://127.0.0.1:${LITELLM_HOST_PORT}/health/liveliness" >/dev/null; then
          echo "LiteLLM is healthy."
          break
        fi
        if [ "\$i" -eq 30 ]; then
          echo "FATAL: LiteLLM failed health check"
          docker logs --tail 200 litellm || true
          exit 1
        fi
        sleep 2
      done

      echo "Cleaning up old LiteLLM images to avoid disk pressure..."
      docker images --format "{{.Repository}}:{{.Tag}}" \
        | grep "^\$DOCKER_REGISTRY" \
        | grep -v "^\$IMAGE\$" \
        | xargs -r docker rmi --force || true

      docker image prune -f
      EOF

    - chmod +x deploy.sh
    - |
      DEPLOY_COMMANDS=$(awk '{gsub(/\\/,"\\\\"); gsub(/"/,"\\\""); printf "%s\\n", $0}' deploy.sh | sed ':a;N;$!ba;s/\n/\\n/g')
      printf '{"commands":["%s"]}\n' "$DEPLOY_COMMANDS" > deploy-params.json

      COMMAND_ID=$(aws ssm send-command \
        --region "$LITELLM_AWS_REGION" \
        --instance-ids $EC2_IDS \
        --document-name "AWS-RunShellScript" \
        --comment "LiteLLM deploy via GitLab" \
        --parameters file://deploy-params.json \
        --query "Command.CommandId" \
        --output text)

      echo "SSM Command ID: $COMMAND_ID"
      export COMMAND_ID

    - |
      WAIT_EXIT=0
      for INSTANCE_ID in $(echo "$EC2_IDS" | tr ' ' '\n'); do
        aws ssm wait command-executed \
          --region "$LITELLM_AWS_REGION" \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID" || WAIT_EXIT=$?
      done

      for INSTANCE_ID in $(echo "$EC2_IDS" | tr ' ' '\n'); do
        echo "========== [SSM OUTPUT for $INSTANCE_ID] =========="
        aws ssm get-command-invocation \
          --region "$LITELLM_AWS_REGION" \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID" \
          --query '{Status:Status,StandardOutput:StandardOutputContent,StandardError:StandardErrorContent}' \
          --output text || true
        echo "==============================================="
      done

      if [ $WAIT_EXIT -ne 0 ]; then
        echo "Deployment failed (SSM waiter exit code: $WAIT_EXIT)"
        exit 1
      fi

deploy-dev:
  extends: .deploy_template
  variables:
    AWS_ACCOUNT_ID: "$DEV_ACCOUNT_ID"
    EC2_IDS: "$DEV_INSTANCE_IDS"
    ENV_FILE: "$LITELLM_DEV_ENV"
  environment:
    name: dev
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

deploy-staging:
  extends: .deploy_template
  variables:
    AWS_ACCOUNT_ID: "$STAGING_ACCOUNT_ID"
    EC2_IDS: "$STAGING_INSTANCE_IDS"
    ENV_FILE: "$LITELLM_STAGING_ENV"
  environment:
    name: staging
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  when: manual

deploy-production:
  extends: .deploy_template
  variables:
    AWS_ACCOUNT_ID: "$PRODUCTION_ACCOUNT_ID"
    EC2_IDS: "$PRODUCTION_INSTANCE_IDS"
    ENV_FILE: "$LITELLM_PRODUCTION_ENV"
  environment:
    name: production
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  when: manual
